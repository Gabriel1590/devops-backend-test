environment:
  STAGE: ${opt:stage, 'dev'}
  AWS_REGION: ${opt:region, 'us-east-1'}
  TENANT_ID: tenant-a

  # Elasticsearch — resolved from SSM at deploy time (deploy-time pattern)
  ES_URL: ${ssm:/companyx-${opt:stage, 'dev'}/es_url, 'http://localhost:9200'}
  ES_USERNAME: ${ssm:/companyx-${opt:stage, 'dev'}/es_username, 'elastic'}
  ES_PASSWORD: ${ssm:/companyx-${opt:stage, 'dev'}/database_url, 'elastic'}

  # LLM model name — fetched at runtime via ssm.ts (runtime pattern)
  # Not set here intentionally; see src/services/ssm.ts → getLlmModelName()

  # Ingest bucket — used to build the index name from the S3 event
  INGEST_BUCKET: companyx-ingest-tenant-a-${opt:stage, 'dev'}
